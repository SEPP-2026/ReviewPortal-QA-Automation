name: Playwright QA Automation

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_suite:
        description: Test suite to run
        required: true
        default: all
        type: choice
        options:
          - all
          - smoke
          - e2e
          - api
      web_base_url:
        description: Optional WEB_BASE_URL override for this run
        required: false
        type: string
      api_base_url:
        description: Optional API_BASE_URL override for this run
        required: false
        type: string
      run_review_submission:
        description: Run additive review submission test
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: playwright-qa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Run Playwright tests
    runs-on: ubuntu-latest
    env:
      WEB_BASE_URL: ${{ inputs.web_base_url || vars.WEB_BASE_URL || secrets.WEB_BASE_URL }}
      API_BASE_URL: ${{ inputs.api_base_url || vars.API_BASE_URL || secrets.API_BASE_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      RUN_REVIEW_SUBMISSION: ${{ inputs.run_review_submission || vars.RUN_REVIEW_SUBMISSION || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Playwright tests
        run: |
          case "${{ inputs.test_suite || 'all' }}" in
            smoke)
              npm run test:smoke
              ;;
            e2e)
              npm run test:e2e
              ;;
            api)
              npm run test:api
              ;;
            all)
              npm test
              ;;
            *)
              echo "Unknown test suite: ${{ inputs.test_suite }}"
              exit 1
              ;;
          esac

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore
